name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run full acceptance suite
        run: make accept

      - name: Run linter
        run: make lint

      - name: Run type checker
        run: make typecheck

      - name: Build real coverage index
        run: make build-real-index

      - name: Run eval dry-run
        run: python scripts/run_eval.py --eval-dir evals/ --dry-run
