project: dma_subsystem
owner_team: dv_dma
top_instance: tb_top.u_dut.u_dma

coverage:
  default_report_id: latest
  reports_root: coverage/urg_report
  format: urg_html
  coverage_model_root: coverage/coverage_model

rtl:
  filelist: rtl/filelist.f
  design_db:
    type: none
  index_path: .dv_ai_index

spec:
  fs:
    path: spec/dma_fs.md
    index_path: .dv_ai_index

registers:
  source:
    type: yaml
    path: registers/dma_regs.yaml
  ral_root: tb/reg_model
  index_path: .dv_ai_index

testbench:
  type: uvm
  env_root: tb/env
  base_test: dma_base_test
  sequence_root: tb/sequences
  index_path: .dv_ai_index

simulation:
  results_root: sim_results
  compile_cmd_template: "echo compile {test}"
  run_cmd_template: "echo run {test} SEED={seed} && echo Test PASSED"
  coverage_cmd_template: "echo cov {test}"

policy:
  allow_direct_file_modification: false
  allow_running_simulation: true
  require_human_review_before_commit: true
