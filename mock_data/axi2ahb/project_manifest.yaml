# axi2ahb project manifest
# Set AXI2AHB_ROOT before running validate/indexer:
#   export AXI2AHB_ROOT=/path/to/AXI2AHB-Lite-Bridge-UVM-Verification
project_root: $AXI2AHB_ROOT

project: axi2ahb
owner_team: dv_axi2ahb
top_instance: top_tb

coverage:
  default_report_id: urgReport_seed_1
  reports_root: urg_report
  format: urg_html
  coverage_model_root: env    # axi2ahb_cov.sv 在 env/ 目录

rtl:
  filelist: sim/filelist.f
  design_db:
    type: none
  index_path: .dv_ai_index

spec:
  fs:
    path: spec/spec.md        # 手动创建的 markdown spec
    index_path: .dv_ai_index
  micro_arch:
    path: doc/spec.pdf
    index_path: .dv_ai_index

registers:
  source:
    type: none                # axi2ahb 无寄存器模型
  ral_root: null
  index_path: .dv_ai_index

testbench:
  type: uvm
  env_root: env
  base_test: tests/base_test.sv
  sequence_root: seq_lib
  agent_root: agent
  config_root: config
  test_root: tests
  index_path: .dv_ai_index

simulation:
  compile_cmd_template: "make -C sim elab TESTNAME={test}"
  run_cmd_template: "make -C sim run TESTNAME={test} SEED={seed}"
  coverage_cmd_template: "make -C sim merge_cov"
  urg_cmd_template: "make -C sim merge_cov"
  timeout_seconds: 300
  urg_timeout_seconds: 120
  results_root: sim_results

remote:
  host: aliyun
  project_root: /root/project_x2h/AXI2AHB-Lite-Bridge-UVM-Verification
  env_setup: ""

policy:
  allow_direct_file_modification: false
  allow_running_simulation: true
  require_human_review_before_commit: true
