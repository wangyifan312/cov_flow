eval_id: triage_gap_0001
task_mode: triage

prompt: |
  使用 dv-coverage-closure。
  项目：{project}
  回归：latest
  范围：{scope}
  任务：分析 GAP_0001 的分类和优先级。
  要求：不修改代码；输出 gap 分类、优先级、是否适合生成 case 和下一步建议。

expected_tools:
  - cov_get_gap_detail
  - cov_get_coverpoint_source

expected_classification: "Config Missing"

expected_output_keys:
  - classification
  - priority
  - recommended_action

notes: |
  GAP_0001 is a linked-list descriptor mode gap. The agent should:
  1. Call cov_get_gap_detail to get the gap facts
  2. Call cov_get_coverpoint_source to see the coverage model
  3. Classify as "Config Missing" (linked-list mode not enabled in existing tests)
  4. Assign P0 or P1 priority (critical descriptor path)
  5. Recommend proceeding to scenario generation
